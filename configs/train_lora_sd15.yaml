# SD 1.5 UNet LoRA（训练时接入 ControlNet 条件前向，ControlNet 权重冻结）
pretrained_model_name_or_path: runwayml/stable-diffusion-v1-5
controlnet_model_name_or_path: lllyasviel/control_v11p_sd15_lineart
train_metadata: data/processed/metadata_train.jsonl
output_dir: checkpoints/lora-sd15-font

resolution: 512
train_batch_size: 1
gradient_accumulation_steps: 4
num_train_epochs: 10
max_train_steps: 4000

learning_rate: 1e-4
lr_scheduler: cosine
lr_warmup_steps: 100

rank: 16
seed: 42
